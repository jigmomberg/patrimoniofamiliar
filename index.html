<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrimonio Familiar 🏖️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --sky-top:#ff5f7e;
    --sky-mid:#ff9a56;
    --sky-bottom:#ffd97d;
    --sand:#fdedc7;
    --sand-dark:#f0d190;
    --ocean:#0a6e73;
    --ocean-light:#17b8a6;
    --coral:#ff5e5b;
    --sun:#ffd23f;
    --seafoam:#2ec4b6;
    --hibiscus:#e94f8a;
    --text:#2b2130;
    --muted:#7a5a63;
    --card:#fffdf6;
    --border:#f6c977;
    --shadow:0 10px 24px rgba(43,20,30,0.18);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Nunito',-apple-system,sans-serif;
    color:var(--text);
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 32%, var(--sky-bottom) 58%, var(--sand) 78%, var(--sand-dark) 100%);
    background-attachment:fixed;
    padding:24px;
    position:relative;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  h1{font-family:'Bungee',cursive;}
  h2{font-family:'Fredoka',sans-serif;}

  /* decorative sun */
  .sun{
    position:fixed;
    top:-60px;
    right:-40px;
    width:220px;
    height:220px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff6d0, var(--sun) 55%, #ff8c42 100%);
    box-shadow:0 0 70px 24px rgba(255,140,66,0.5);
    z-index:0;
    pointer-events:none;
  }
  .cloud{
    position:fixed;
    z-index:0;
    pointer-events:none;
    font-size:34px;
    opacity:.6;
    animation:drift 60s linear infinite;
  }
  .cloud.c1{top:8%; left:-10%; animation-duration:70s;}
  .cloud.c2{top:16%; left:-20%; font-size:26px; animation-duration:95s; animation-delay:-30s;}
  .cloud.c3{top:5%; left:-30%; font-size:20px; animation-duration:50s; animation-delay:-10s;}
  @keyframes drift{
    from{ transform:translateX(0); }
    to{ transform:translateX(140vw); }
  }
  .palm{
    position:fixed;
    bottom:78px;
    font-size:100px;
    z-index:0;
    pointer-events:none;
    filter:brightness(0);
    opacity:.6;
    animation:sway 5s ease-in-out infinite;
    transform-origin:bottom center;
  }
  .palm.p1{left:1%;}
  .palm.p2{right:0%; transform:scaleX(-1); animation-delay:-2s;}
  @keyframes sway{
    0%,100%{ transform:rotate(-3deg); }
    50%{ transform:rotate(3deg); }
  }
  .palm.p2{ }
  @keyframes sway-flip{
    0%,100%{ transform:scaleX(-1) rotate(-3deg); }
    50%{ transform:scaleX(-1) rotate(3deg); }
  }
  .palm.p2{ animation-name:sway-flip; }
  .waves{
    position:fixed;
    left:0; right:0; bottom:0;
    height:110px;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .waves svg{ position:absolute; bottom:0; width:200%; height:100%; animation:wave-move 14s linear infinite; }
  .waves svg.wave2{ opacity:.6; animation-duration:22s; animation-direction:reverse; }
  @keyframes wave-move{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
  }

  .wrap{max-width:1080px;margin:0 auto;position:relative;z-index:1;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:22px;
  }
  h1{
    font-size:26px;
    margin:0 0 6px 0;
    font-weight:400;
    color:#fff;
    text-shadow:0 2px 6px rgba(43,33,48,0.35);
    letter-spacing:.5px;
  }
  h1[contenteditable]:focus{outline:none;}
  .subtitle{color:#fff;font-size:13px;font-weight:700;text-shadow:1px 1px 0 rgba(43,33,48,0.35);}

  button{
    background:var(--card);
    border:2px solid var(--border);
    color:var(--text);
    padding:9px 16px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
    font-family:'Nunito',sans-serif;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 3px 0 var(--border);
  }
  button:hover{ transform:translateY(-2px); box-shadow:0 5px 0 var(--border); }
  button:active{ transform:translateY(1px); box-shadow:0 1px 0 var(--border); }
  button.danger-btn{
    background:#fff;
    border:2px solid #ffd7d2;
    color:var(--coral);
    padding:4px 9px;
    font-size:12px;
    box-shadow:none;
    border-radius:50%;
  }
  button.danger-btn:hover{ background:var(--coral); color:#fff; transform:scale(1.1); }

  .hero{
    background:linear-gradient(135deg,#ffffff, #fff8e6);
    border:2px solid var(--border);
    border-radius:24px;
    padding:26px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:24px;
    box-shadow:var(--shadow);
  }
  .hero-total .label{color:var(--muted);font-size:14px;margin-bottom:4px;font-weight:700;}
  .hero-total .value{
    font-family:'Fredoka',sans-serif;
    font-size:44px;
    font-weight:700;
    color:var(--ocean);
    letter-spacing:-0.5px;
  }
  .hero-updated{color:var(--muted);font-size:12px;margin-top:8px;}
  .lifering{
    width:170px;
    height:170px;
    border-radius:50%;
    flex-shrink:0;
    padding:10px;
    background:
      repeating-conic-gradient(#ff5a4e 0deg 22.5deg, #ffffff 22.5deg 45deg);
    box-shadow:0 8px 18px rgba(0,0,0,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .lifering-inner{
    width:100%;
    height:100%;
    border-radius:50%;
    background:var(--card);
    padding:10px;
  }
  .chart-box{width:100%;height:100%;}

  .goal-box{
    background:linear-gradient(180deg,#e3f9f7,#fff);
    border:2px solid var(--border);
    border-radius:24px;
    padding:22px 24px 18px;
    margin-bottom:20px;
    box-shadow:var(--shadow);
  }
  .goal-header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:16px;
    font-size:14px;
  }
  .goal-header .goal-label{color:var(--muted);font-weight:700;}
  .goal-header .goal-label span[contenteditable]{
    color:var(--ocean);
    font-weight:800;
    border-bottom:2px dashed var(--ocean-light);
    padding:0 2px;
  }
  .goal-header .goal-label span[contenteditable]:focus{outline:none;border-color:var(--coral);}
  .goal-pct{font-weight:800;font-size:16px;color:var(--coral);font-family:'Fredoka',sans-serif;}

  .goal-track-wrap{ position:relative; padding-top:30px; padding-bottom:6px; }
  .goal-track{
    position:relative;
    height:20px;
    background:repeating-linear-gradient(115deg, #bdeef0 0 12px, #8fdfe4 12px 24px);
    border-radius:999px;
    border:2px solid var(--ocean-light);
    overflow:visible;
    box-shadow:inset 0 2px 4px rgba(10,110,115,0.25);
  }
  .goal-fill{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg,var(--hibiscus),var(--coral),var(--sun));
    transition:width .6s ease;
    position:relative;
  }
  .goal-start{
    position:absolute;
    left:-6px;
    top:50%;
    transform:translate(-50%,-50%);
    font-size:20px;
  }
  .goal-flag{
    position:absolute;
    right:-10px;
    top:50%;
    transform:translate(50%,-50%);
    font-size:24px;
  }
  .goal-boat{
    position:absolute;
    top:-26px;
    left:0%;
    transform:translateX(-50%);
    font-size:28px;
    transition:left .6s ease;
    display:inline-block;
    animation:surf-bob 1.1s ease-in-out infinite alternate;
  }
  @keyframes surf-bob{
    0%{ transform:translateX(-50%) rotate(-10deg) translateY(0); }
    100%{ transform:translateX(-50%) rotate(10deg) translateY(-4px); }
  }
  .goal-sub{
    margin-top:12px;
    font-size:13px;
    color:var(--muted);
    font-weight:700;
  }
  .goal-sub.reached{color:var(--seafoam);}

  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:14px;
    margin-bottom:22px;
  }
  .card{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:18px;
    padding:16px;
    box-shadow:var(--shadow);
    transition:transform .15s ease;
  }
  .card:hover{ transform:translateY(-3px) rotate(-0.5deg); }
  .card .icon-badge{
    width:34px;height:34px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:17px;
    margin-right:8px;
    vertical-align:middle;
  }
  .card .name{font-size:13px;color:var(--muted);font-weight:700;display:flex;align-items:center;}
  .card .amount{font-family:'Fredoka',sans-serif;font-size:21px;font-weight:600;margin-top:8px;color:var(--text);}
  .card .pct{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600;}

  section.category{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:20px;
    margin-bottom:16px;
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  .cat-header{
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px dashed var(--border);
  }
  .cat-title{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;font-family:'Fredoka',sans-serif;}
  .cat-title .icon-badge{
    width:30px;height:30px;
    border-radius:50%;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
  }
  .cat-total{font-weight:800;font-size:15px;color:var(--ocean);font-family:'Fredoka',sans-serif;}
  table{width:100%;border-collapse:collapse;}
  th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--muted);
    padding:10px 18px;
    font-weight:800;
  }
  td{padding:6px 18px;}
  tbody tr{border-top:1px dashed var(--border);}
  input[type=text]{
    width:100%;
    background:transparent;
    border:2px solid transparent;
    color:var(--text);
    padding:8px 8px;
    border-radius:10px;
    font-size:14px;
    font-family:'Nunito',sans-serif;
    font-weight:600;
  }
  input[type=text]:hover, input[type=text]:focus{
    background:#fff8e6;
    border-color:var(--border);
    outline:none;
  }
  input.amount-input{text-align:right;font-variant-numeric:tabular-nums;}
  td.amount-cell{white-space:nowrap;}
  td.del-cell{width:36px;text-align:center;}
  .add-row{
    padding:12px 18px 16px;
    display:flex;
  }
  .add-row button{width:100%;text-align:center;color:var(--ocean);border-style:dashed;}

  footer{
    text-align:center;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    margin-top:28px;
    padding-bottom:12px;
  }

  .confetti-piece{
    position:fixed;
    top:-30px;
    z-index:999;
    font-size:22px;
    pointer-events:none;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(105vh) rotate(360deg); opacity:.9; }
  }

  @media(max-width:600px){
    body{ padding:12px; }
    .sun{ width:130px; height:130px; top:-40px; right:-30px; }
    .palm{ font-size:60px; bottom:60px; }
    .cloud{ font-size:22px; }
    h1{ font-size:20px; }
    .subtitle{ font-size:12px; }
    .hero{ padding:16px; gap:14px; }
    .hero-total .value{ font-size:32px; }
    .lifering{ width:110px; height:110px; align-self:center; }
    .goal-box{ padding:16px 14px 14px; }
    .card{ padding:12px; }
    .card .amount{ font-size:18px; }
    table, thead, tbody, tr, td{ display:block; width:100%; }
    thead{ display:none; }
    section.category tbody tr{
      padding:10px 14px 12px;
      border-top:1px dashed var(--border);
    }
    section.category td{ padding:4px 0; }
    section.category td[data-label]::before{
      content: attr(data-label);
      display:block;
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:var(--muted);
      font-weight:800;
      margin-bottom:2px;
    }
    td.del-cell{ display:flex; justify-content:flex-end; padding-top:6px !important; }
    td.del-cell::before{ display:none; }
    .cat-header{ padding:12px 14px; }
    input.amount-input{ text-align:left; }
  }

  .auth-overlay{
    position:fixed;
    inset:0;
    z-index:1000;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .auth-box{
    background:var(--card);
    border:2px solid var(--border);
    border-radius:24px;
    padding:32px;
    width:100%;
    max-width:340px;
    text-align:center;
    box-shadow:var(--shadow);
    position:relative;
    z-index:1;
  }
  .auth-box h2{margin:0 0 4px 0;font-size:20px;color:var(--ocean);}
  .auth-box p{color:var(--muted);font-size:13px;margin:0 0 18px
